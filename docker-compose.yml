services:
  app:
    build: .
    container_name: proyecto_ats_app
    ports:
      - "8002:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    container_name: proyecto_ats_mysql
    restart: always
    environment:
      MYSQL_DATABASE: proyecto_ats
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    ports:
      - "3309:3306"
